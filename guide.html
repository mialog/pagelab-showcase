<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageLab - 템플릿 가이드</title>
  <link rel="stylesheet" href="./tokens/base.css">
  <link rel="stylesheet" href="./tokens/campaign.css">
  <link rel="stylesheet" href="./styles/showcase.css">
  <link rel="stylesheet" href="./styles/guide.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
</head>
<body>
  <div class="showcase">
    <!-- Header -->
    <header class="showcase__header">
      <div class="showcase__header-inner">
        <div class="showcase__logo">
          <span>PageLab</span>
        </div>
        <nav class="showcase__nav">
          <a href="index.html" class="showcase__nav-link">섹션 둘러보기</a>
          <a href="guide.html" class="showcase__nav-link is-active">템플릿 가이드</a>
          <a href="creative.html" class="showcase__nav-link">페이지 빌더</a>
        </nav>
        <button class="showcase__theme-toggle" id="themeToggle" aria-label="테마 전환">
          <svg class="theme-toggle__icon theme-toggle__icon--light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="showcase__main showcase__main--full">
      <div class="guide">
        <div class="guide__header">
          <h1 class="guide__title">템플릿 가이드</h1>
          <p class="guide__desc">
            목적에 맞는 추천 템플릿을 선택하세요. 클릭하면 실제 페이지처럼 미리볼 수 있습니다.
          </p>
        </div>

        <!-- Template Cards -->
        <div class="guide__templates" id="templateList">
          <div class="guide__loading">템플릿 로딩 중...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="./js/guide.js"></script>
</body>
</html>
