<section class="pl-section pl-benefit pl-benefit--img" data-section="benefit">
  <div class="pl-section__container pl-benefit__container">

    <!-- Section Title Component -->
    <pl-section-title label="EVENT BENEFITS" heading="솔루니 봄 독서 축제 특별 혜택" description="솔루니 이벤트에 참여하시면<br>무료 체험수업, 독서토론 키트, 학습 상담까지 다양한 혜택을 드립니다." note="*혜택은 솔루니 신규 회원에 한해 제공됩니다."></pl-section-title>

    <!-- Benefit Image -->
    <div class="pl-benefit__image">
      <picture>
        <source media="(max-width: 639px)" srcset="../../images/benefit/benefit-img_mo.png">
        <source media="(max-width: 1199px)" srcset="../../images/benefit/benefit-img_tab.png">
        <img src="./../../images/benefit/benefit-img_pc.png" alt="혜택 안내 이미지" onerror="this.style.display='none'">
      </picture>
    </div>

    <!-- CTA Button -->
    <div class="pl-benefit__cta">
      <pl-button variant="primary" size="large">혜택 확인하고 체험수업 신청하기</pl-button>
    </div>

  </div>
</section>
