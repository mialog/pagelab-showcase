<section class="pl-section pl-about pl-about--tab" data-section="about">
  <div class="pl-section__container pl-about__container">

    <!-- Section Title Component -->
    <pl-section-title label="Core Features" heading="눈높이 맞춤학습 핵심 기능" description="AI 기술과 48년 교육 노하우가 만든 5가지 핵심 기능이<br>우리 아이의 학습 실력을 체계적으로 키워 드립니다." note="*부가 설명 (선택)"></pl-section-title>

    <!-- Tab Container -->
    <div class="pl-tab-container">
      <!-- Tab Navigation - Style A (PC/Tablet) -->
      <nav class="pl-tab-nav pl-tab-nav--desktop">
        <button class="pl-tab-btn is-active" data-tab="tab-a1">AI 진단평가</button>
        <button class="pl-tab-btn" data-tab="tab-a2">맞춤 국어</button>
        <button class="pl-tab-btn" data-tab="tab-a3">맞춤 수학</button>
        <button class="pl-tab-btn" data-tab="tab-a4">맞춤 영어</button>
        <button class="pl-tab-btn" data-tab="tab-a5">학습 리포트</button>
      </nav>

      <!-- Tab Navigation - Style A (Mobile: Two Row Structure) -->
      <div class="pl-tab-nav-mobile pl-tab-nav-mobile--style-a">
        <div class="pl-tab-nav-row--a">
          <button class="pl-tab-btn is-active" data-tab="tab-a1">AI 진단평가</button>
          <button class="pl-tab-btn" data-tab="tab-a2">맞춤 국어</button>
          <button class="pl-tab-btn" data-tab="tab-a3">맞춤 수학</button>
        </div>
        <div class="pl-tab-nav-row--a pl-tab-nav-row--a-narrow">
          <button class="pl-tab-btn" data-tab="tab-a4">맞춤 영어</button>
          <button class="pl-tab-btn" data-tab="tab-a5">학습 리포트</button>
        </div>
      </div>

      <!-- Tab Content -->
      <div class="pl-tab-content">
        <div class="pl-tab-panel is-active" data-tab="tab-a1">
          <div class="pl-tab-panel__image">
            <img src="./../../images/about/about_e_tab_1.png" alt="첫번째 탭 이미지" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="pl-tab-panel" data-tab="tab-a2">
          <div class="pl-tab-panel__image">
            <img src="./../../images/about/about_e_tab_2.png" alt="두번째 탭 이미지" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="pl-tab-panel" data-tab="tab-a3">
          <div class="pl-tab-panel__image">
            <img src="./../../images/about/about_e_tab_3.png" alt="세번째 탭 이미지" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="pl-tab-panel" data-tab="tab-a4">
          <div class="pl-tab-panel__image">
            <img src="./../../images/about/about_e_tab_4.png" alt="네번째 탭 이미지" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="pl-tab-panel" data-tab="tab-a5">
          <div class="pl-tab-panel__image">
            <img src="./../../images/about/about_e_tab_5.png" alt="다섯번째 탭 이미지" onerror="this.style.display='none'">
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
